.larder{--paper:#EEF1EA;--card:#fff;--ink:#232A22;--green:#2F5D3F;--green-d:#1F3F2A;--amber:#E0962E;--amber-d:#C97E1C;--muted:#6B7568;--line:#DCE2D6;
  font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--paper);
  max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:78px;-webkit-font-smoothing:antialiased;}
.larder *{box-sizing:border-box;}
.larder h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:26px;margin:0;letter-spacing:-.01em;color:var(--green-d);}
.loading{padding:80px 24px;text-align:center;color:var(--muted);font-style:italic;}
.banner{background:#FBEFD7;color:#8a5a12;font-size:12.5px;text-align:center;padding:7px 12px;}

.head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px;position:sticky;top:0;background:var(--paper);z-index:5;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:21px;color:var(--green-d);line-height:1;}
.brand-sub{font-size:11.5px;color:var(--muted);margin-top:2px;}

.screen{padding:6px 18px 24px;}
.screen-head{margin:8px 0 16px;}
.screen-head.row{display:flex;justify-content:space-between;align-items:flex-end;}
.screen-head p{margin:5px 0 0;color:var(--muted);font-size:13.5px;}
.head-actions{display:flex;gap:8px;}

.stack{display:flex;flex-direction:column;gap:10px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;}
.card.pad{padding:14px;}

/* plan */
.plan-card{display:flex;align-items:center;justify-content:space-between;background:var(--card);
  border:1px solid var(--line);border-radius:14px;padding:13px 14px;transition:border-color .15s,box-shadow .15s;}
.plan-card.active{border-color:var(--green);box-shadow:0 0 0 1px var(--green) inset;}
.plan-info{flex:1;cursor:pointer;}
.plan-name{font-weight:600;font-size:15.5px;}
.plan-meta{font-size:12.5px;color:var(--muted);margin-top:2px;}
.stepper{display:flex;align-items:center;gap:2px;background:var(--paper);border-radius:10px;padding:3px;}
.stepper button{width:30px;height:30px;border:none;background:#fff;border-radius:8px;font-size:18px;color:var(--green);cursor:pointer;line-height:1;}
.stepper button:disabled{color:#c3c9bf;cursor:default;}
.stepper span{min-width:22px;text-align:center;font-weight:600;font-variant-numeric:tabular-nums;}

.cta{width:100%;margin-top:16px;background:var(--amber);color:#fff;border:none;border-radius:13px;
  padding:14px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 2px 0 var(--amber-d);}
.cta:active{transform:translateY(1px);box-shadow:0 1px 0 var(--amber-d);}
.note{font-size:12px;color:var(--muted);text-align:center;margin-top:10px;}

/* meals */
.meal-top{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;cursor:pointer;}
.meal-name{font-weight:600;font-size:15.5px;}
.meal-stores{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.chip{color:#fff;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;}
.muted{color:var(--muted);font-size:12px;}
.caret{color:var(--muted);transition:transform .18s;}
.caret.up{transform:rotate(180deg);}
.meal-body{padding:0 14px 14px;border-top:1px solid var(--line);}
.field{display:block;margin:12px 0;}
.field span{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
.larder input{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:var(--paper);
  border:1px solid transparent;border-radius:9px;padding:9px 10px;outline:none;}
.larder input:focus{border-color:var(--green);background:#fff;}

.ing-head{display:grid;grid-template-columns:1fr 56px 1fr 26px;gap:6px;font-size:11px;color:var(--muted);
  margin:8px 2px 4px;text-transform:uppercase;letter-spacing:.04em;}
.ing-row{display:grid;grid-template-columns:1fr 56px 1fr 26px;gap:6px;margin-bottom:6px;align-items:center;}
.ing-row input{padding:8px;}
.x{border:none;background:none;color:#c08;font-size:20px;cursor:pointer;opacity:.6;line-height:1;}
.x:hover{opacity:1;}
.add-row{margin-top:6px;background:none;border:1px dashed var(--line);color:var(--green);
  border-radius:9px;padding:9px;width:100%;font-family:inherit;font-size:13.5px;cursor:pointer;}
.del{margin-top:14px;background:none;border:none;color:#b04a3a;font-size:13px;cursor:pointer;font-family:inherit;}

/* receipt list */
.receipt{position:relative;margin-top:4px;filter:drop-shadow(0 6px 14px rgba(40,55,40,.12));}
.tear{height:10px;background:
  linear-gradient(-45deg,var(--paper) 6px,transparent 0) 0 100%,
  linear-gradient(45deg,var(--paper) 6px,transparent 0) 0 100%;
  background-size:14px 14px;background-repeat:repeat-x;}
.tear.bottom{transform:scaleY(-1);}
.receipt-inner{background:#fff;padding:6px 18px 4px;}
.store-sec{padding:12px 0;border-bottom:1px dashed #DAD5C7;}
.store-sec:last-of-type{border-bottom:none;}
.store-title{display:flex;align-items:center;gap:7px;font-family:'Bricolage Grotesque',sans-serif;
  font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--green-d);margin-bottom:6px;}
.dotc{width:9px;height:9px;border-radius:50%;}
.rline{display:flex;align-items:center;gap:11px;width:100%;background:none;border:none;
  padding:8px 2px;font-family:inherit;font-size:14.5px;color:var(--ink);cursor:pointer;text-align:left;}
.box{flex:none;width:21px;height:21px;border:1.6px solid var(--green);border-radius:6px;
  display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;}
.rname{flex:1;}
.rqty{color:var(--muted);font-size:13px;font-variant-numeric:tabular-nums;}
.rline.got .box{background:var(--green);}
.rline.got .rname{text-decoration:line-through;color:#9aa395;}
.receipt-total{display:flex;justify-content:space-between;font-family:'Bricolage Grotesque',sans-serif;
  font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--green-d);
  border-top:2px solid var(--ink);margin-top:8px;padding:12px 0 8px;}

.mini{background:var(--green);color:#fff;border:none;border-radius:9px;padding:8px 14px;
  font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.mini.ghost{background:none;color:var(--muted);border:1px solid var(--line);}

/* quick add one-off items */
.quick{display:grid;grid-template-columns:1fr 48px 84px 38px;gap:6px;margin:2px 0 10px;}
.quick input{font-family:inherit;font-size:13.5px;color:var(--ink);background:#fff;border:1px solid var(--line);
  border-radius:9px;padding:9px 10px;outline:none;}
.quick input:focus{border-color:var(--green);}
.q-qty{text-align:center;}
.q-add{border:none;background:var(--green);color:#fff;border-radius:9px;font-size:20px;line-height:1;cursor:pointer;}
.q-add:disabled{background:#c4ccbd;cursor:default;}
.extras{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 12px;}
.ex-chip{display:inline-flex;align-items:center;gap:5px;background:#EDE5D4;color:#7a5a1e;
  font-size:12.5px;padding:4px 6px 4px 11px;border-radius:20px;}
.ex-chip button{border:none;background:none;color:#a07b2e;font-size:15px;line-height:1;cursor:pointer;padding:0;}

.empty{background:#fff;border:1px dashed var(--line);border-radius:14px;padding:26px 18px;
  text-align:center;color:var(--muted);font-size:14px;line-height:1.5;}
.empty.small{padding:14px;border:none;}

/* nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  display:flex;background:#fff;border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom,0px));z-index:10;}
.navbtn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 0;color:var(--muted);font-family:inherit;font-size:11px;cursor:pointer;position:relative;}
.navbtn.on{color:var(--green);}
.navbtn .dot{position:absolute;top:4px;right:50%;margin-right:-16px;width:7px;height:7px;border-radius:50%;background:var(--amber);}

.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:10px 18px;border-radius:22px;font-size:13.5px;z-index:20;box-shadow:0 4px 14px rgba(0,0,0,.2);}

/* import sheet */
.sheet-wrap{position:fixed;inset:0;background:rgba(31,40,30,.42);z-index:30;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--paper);width:100%;max-width:480px;max-height:92vh;overflow-y:auto;
  border-radius:20px 20px 0 0;padding:8px 18px calc(22px + env(safe-area-inset-bottom,0px));animation:rise .22s ease;}
@keyframes rise{from{transform:translateY(24px);opacity:.6;}to{transform:none;opacity:1;}}
.sheet-grip{width:38px;height:4px;border-radius:4px;background:#cfd6c8;margin:6px auto 12px;}
.sheet h2{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:21px;margin:0 0 6px;color:var(--green-d);}
.sheet-sub{font-size:13.5px;color:var(--muted);margin:0 0 14px;line-height:1.45;}
.paste{width:100%;min-height:130px;font-family:inherit;font-size:13.5px;line-height:1.5;color:var(--ink);
  background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px;resize:vertical;outline:none;}
.paste:focus{border-color:var(--green);}
.check-line{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--ink);margin:12px 2px 4px;cursor:pointer;}
.check-line input{width:17px;height:17px;accent-color:var(--green);}
.how{margin-top:12px;font-size:13px;}
.how summary{color:var(--green);cursor:pointer;font-weight:500;}
.how p{color:var(--muted);line-height:1.5;margin:8px 0 0;}
.sheet-actions{display:flex;gap:10px;margin-top:18px;}
.solid-btn,.ghost-btn{flex:1;border-radius:12px;padding:13px;font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer;}
.solid-btn{background:var(--amber);color:#fff;border:none;box-shadow:0 2px 0 var(--amber-d);}
.solid-btn:disabled{background:#d8cbb2;box-shadow:none;cursor:default;}
.ghost-btn{background:none;color:var(--muted);border:1px solid var(--line);}
.review-list{max-height:46vh;overflow-y:auto;margin:4px -4px 2px;padding:0 4px;}
.review-row{display:grid;grid-template-columns:26px 1fr 58px;gap:8px;align-items:center;margin-bottom:7px;}
.review-row.off input{opacity:.4;text-decoration:line-through;}
.review-row input{font-family:inherit;font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 9px;outline:none;}
.review-row input:focus{border-color:var(--green);}
.review-row .qty-in{text-align:center;}
.tick{width:24px;height:24px;border:1.6px solid var(--green);border-radius:6px;background:#fff;color:#fff;
  font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.tick.on{background:var(--green);}
.dest{display:flex;align-items:center;justify-content:space-between;margin:16px 0 4px;}
.dest-label{font-size:13px;color:var(--muted);}
.seg{display:flex;background:#fff;border:1px solid var(--line);border-radius:10px;padding:3px;}
.seg button{border:none;background:none;padding:7px 16px;border-radius:8px;font-family:inherit;font-size:13.5px;color:var(--muted);cursor:pointer;}
.seg button.on{background:var(--green);color:#fff;}

/* header stores button + stores manager */
.head-stores{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--line);color:var(--green-d);
  border-radius:20px;padding:7px 13px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.head-stores svg{color:var(--green);}
.store-add{display:flex;gap:8px;margin:4px 0 14px;}
.store-add input{flex:1;font-family:inherit;font-size:14px;background:#fff;border:1px solid var(--line);
  border-radius:10px;padding:11px;outline:none;color:var(--ink);}
.store-add input:focus{border-color:var(--green);}
.add-store{flex:none;width:auto;padding:11px 18px;}
.store-list{max-height:54vh;overflow-y:auto;margin:0 -2px;padding:0 2px;}
.store-row{display:grid;grid-template-columns:14px 1fr auto auto 24px;gap:9px;align-items:center;
  background:#fff;border:1px solid var(--line);border-radius:11px;padding:9px 11px;margin-bottom:8px;}
.store-row input{font-family:inherit;font-size:14.5px;font-weight:500;color:var(--ink);background:none;
  border:none;border-bottom:1px solid transparent;padding:3px 0;outline:none;width:100%;}
.store-row input:focus{border-bottom-color:var(--green);}
.store-use{font-size:11.5px;color:var(--muted);min-width:16px;text-align:center;font-variant-numeric:tabular-nums;}
.reorder{display:flex;flex-direction:column;gap:2px;}
.reorder button{border:none;background:none;color:var(--green);font-size:9px;line-height:1;cursor:pointer;padding:1px 3px;}
.reorder button:disabled{color:#cdd4c6;cursor:default;}

/* household switch row in the stores sheet */
.hh-row{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:14px;
  border-top:1px solid var(--line);font-size:12.5px;color:var(--muted);}
.hh-row b{color:var(--ink);}
.hh-row button{background:none;border:none;color:var(--green);font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;}

/* join / household code screen */
.join{font-family:Inter,system-ui,sans-serif;background:var(--paper);min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:24px;}
.join-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:30px 24px;
  max-width:360px;width:100%;text-align:center;box-shadow:0 8px 24px rgba(40,55,40,.08);}
.join-card h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:30px;color:var(--green-d);margin:0;letter-spacing:-.01em;}
.join-sub{font-size:14px;color:var(--muted);line-height:1.5;margin:8px 0 18px;}
.join-input{width:100%;font-family:inherit;font-size:16px;text-align:center;color:var(--ink);
  background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:13px;outline:none;}
.join-input:focus{border-color:var(--green);background:#fff;}
.join-btn{width:100%;margin-top:12px;background:var(--amber);color:#fff;border:none;border-radius:12px;
  padding:14px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 2px 0 var(--amber-d);}
.join-btn:active{transform:translateY(1px);box-shadow:0 1px 0 var(--amber-d);}
.join-note{font-size:11.5px;color:var(--muted);line-height:1.45;margin:14px 0 0;}
.setup-in{text-align:left;font-size:14px;margin-bottom:10px;}
.join-btn:disabled{background:#d8cbb2;box-shadow:none;cursor:default;}
